<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AR/VR First Aid — PSM Test</title>
</head>
<body>
    <h2>PatientStateModel — scenario test</h2>
    <p>Open the browser console to see the simulation running.</p>
    <button onclick="window.model?.start()">Start</button>
    <button onclick="window.model?.stop()">Stop</button>

    <script type="module">
        import { PatientStateModel } from './core/PatientStateModel.js'

        // fetch the scenario JSON, then create the model with it
        const response = await fetch('./scenarios/broken-leg-adult.json')
        const scenario = await response.json()

        const model = new PatientStateModel(scenario)
        window.model = model

        console.log('Scenario loaded:', scenario.scenarioName)
        console.log('Initial state:', model.parameters)
    </script>
</body>
</html>
